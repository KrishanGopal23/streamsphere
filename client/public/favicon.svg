<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#grad)" fill-opacity="0.1" />

  <!-- Circular Stream -->
  <circle
    cx="50"
    cy="50"
    r="40"
    stroke="url(#grad)"
    stroke-width="8"
    stroke-dasharray="180 60"
  />

  <!-- Play Button -->
  <path
    d="M42 35L65 50L42 65V35Z"
    fill="url(#grad)"
  />

  <!-- Center Dot -->
  <circle
    cx="50"
    cy="50"
    r="2"
    fill="white"
  />
</svg>
