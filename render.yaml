services:
  - type: web
    name: streamsphere-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://streamsphere-client.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: YOUTUBE_API_KEY
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300

  - type: web
    name: streamsphere-client
    runtime: static
    buildCommand: npm install && npm run build --workspace client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://streamsphere-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://streamsphere-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
